# 全裕 API 配置
quanyu:
  appid: "ZTvK1rE8jQ9wJ3vJ4oT4qF3eS1cJ8vX5"
  key: "wT0dD7uQ3cB3pV2fZ7dA3sD7eZ7uP4uE"
  base_url: "https://iot.xtrunc.com"
  timeout: 30s
  max_retries: 3

# 设备列表获取
device_api:
  url: "https://api.yunniaotech.com/api/admin/devices/uids"
  refresh_interval: 6h

# MongoDB 配置
mongodb:
  uri: "mongodb://localhost:27017"
  database: "quanyu_battery"
  username: "root"
  password: "root123"

# 回调服务配置
callback:
  listen_addr: ":8080"
  notifyurl_base: "http://y3b665bc.natappfree.cc"

# 订阅配置
subscribe:
  batch_size: 20
  renew_interval: 25m
  sub_data:
    - "info"
    - "alarm"
    - "online"

# 日志配置
log:
  dir: "logs"
  level: "info"
  max_size: 100
  max_backups: 30
  max_age: 30
  api_debug_log: true

# 同步任务配置
sync:
  detail:
    cron: "0 */2 * * * *"
    enabled: true
  history_data:
    cron: "0 */5 * * * *"
    enabled: true
    default_range: 1h
  trace:
    cron: "0 */5 * * * *"
    enabled: true
    default_range: 1h
  event:
    cron: "0 */5 * * * *"
    enabled: true
    default_range: 1h
  charge_data:
    cron: "0 */10 * * * *"
    enabled: true
    default_range: 2h
